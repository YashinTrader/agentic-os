    supports_streaming: false
    supports_execution: true
    execution_scope: local_worktree
    dedicated_runner_required: true
    required_execution_route: codex_local_builder
    maximum_runs: 0
    automatic_disable_after_run: false
    live_run_authorized: true
    phase3_7b_authorization_required: false
    writes_files: true
    approval_level: none
    risk_level: high
    promotion_state: restricted_execution
    supports_preview: true
    worktree_required: true
    network_required: true
    mcp_required: false
    minimum_version: "0.136.0"
    context_bundle_required: true
    handoff_required: true
    rollback_required: true
    notes: >
      Autonomous local builder. Standing policy auto_local_worktree authorizes bounded
      Codex work in isolated worktrees. Generic dispatch blocked. See codex_restricted_adapter.yaml.
