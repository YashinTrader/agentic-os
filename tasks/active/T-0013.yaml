handoff_notes: "Refer to docs/REVIEW_CLAUDE_DASHBOARD_V0.md for resubmission context."
acceptance_criteria:
  - "`dashboard/app.py` exists and runs via `streamlit run dashboard/app.py` against the real repo without raising."
  - "`dashboard/requirements.txt` lists exactly `streamlit` and `pyyaml`, pinned to a minimum version."
  - "`dashboard/README.md` documents: how to run, what it reads, what it explicitly does NOT do (link the non-goals), and known limitations."
  - "The Kanban shows five columns (todo, in_progress, review, blocked, done) and excludes `EXAMPLE.yaml`."
  - "Clicking a task opens a detail view that renders every field listed under `goals` above, using the real schema keys (`acceptance`, `notes`, `created_at`, `updated_at`, `priority` as text, etc.)."
