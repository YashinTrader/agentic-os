human_approval_checklist:
  - Confirm the dashboard performs zero writes (no subprocess, no file mutation).
  - Confirm the parser uses the schema fields in `docs/TASK_SCHEMA.md` exactly (no aliases, no invented fields).
  - Confirm the events parser handles unknown `type` values without crashing.
  - Confirm dependencies are exactly `streamlit` and `pyyaml`.
  - Confirm the real-repo smoke test exists and passes.

notes: |
  This task supersedes `tasks/active/T-DASHBOARD-V0.yaml`. On acceptance:

    - Delete `tasks/active/T-DASHBOARD-V0.yaml`, or move it to `tasks/done/`
      annotated as superseded-by: T-0013.
    - Keep `docs/DASHBOARD_PROTOCOL_GAPS.md` (it is useful Phase 2 input).
    - Keep, do not re-write, the existing CSS / visual treatment from the V0
      attempt where possible; the visuals were fine, the data binding was
      not.

  A read-write dashboard (Control Room) is explicitly out of scope. If wanted
  later, it must land as `T-0014` behind its own ADR.

  Implementation hint: prefer Streamlit's native widgets over raw HTML for
  task cards. Where HTML is unavoidable, route every interpolated string
  through `html.escape()`. The visual loss is small; the safety win is real.

  If the parser discovers a schema ambiguity (e.g. an existing task uses a
  field not documented in `TASK_SCHEMA.md`), raise it in the handoff under
  `open_questions`. Do not silently extend the schema.
