id: T-0025
title: Implement Librarian batch command skeleton
status: review
owner: codex
reviewer: claude
created_by: codex
created_at: '2026-05-24T14:45:00Z'
updated_at: '2026-05-24T21:17:36Z'
phase: '2.1'
priority: high
risk_level: high
requires_human_approval: true
depends_on:
- T-0022
- T-0024
related_decisions:
- ADR-0007
- ADR-0008
- ADR-0009
objective: 'Implement the Librarian batch command skeleton with citation, confidence,
  undo, deduplication, idempotency, and audit-event machinery, but no LLM extraction
  yet.

  '
context: 'ADR-0008 defines the Librarian as a batchable local role and the only writer

  to shared memory. This task implements the skeleton and policy machinery

  before semantic/LLM extraction is introduced.

  '
goals:
- Add a batch command entrypoint for Librarian runs.
- Implement candidate validation for citation, confidence threshold, and source refs.
- Implement stable idempotency keys and duplicate detection.
- Produce undo records for candidate writes.
- Append run-summary audit events with candidates, writes, skips, and conflicts.
non_goals:
- Do not use an LLM.
- Do not perform cloud calls.
- Do not implement continuous watching or a daemon.
- Do not expose MCP write tools beyond the ADR-0009 feature flag boundary.
inputs:
- decisions/ADR-0008-librarian-and-write-rules.md
- decisions/ADR-0009-mcp-adapter-contract.md
- scripts/
- tests/
outputs:
- scripts/
- tests/
- logs/agent-events.jsonl
constraints:
- Batch runs must be idempotent.
- Shared writes must be disabled unless explicit local config enables them.
- Audit events must use ADR-0004 vocabulary.
acceptance:
- Command can run in dry-run mode over fixture records.
- Candidate validation rejects uncited, low-confidence, and conflicting records.
- Undo records are generated before accepted writes.
- Run summary includes candidate, write, skip, and conflict counts.
- Circuit breaker behavior is covered by tests.
- '`python3 scripts/validate.py` exits 0.'
human_approval_checklist:
- Confirm no daemon or watcher is introduced.
- Confirm no LLM extraction is added.
- Confirm shared writes remain disabled by default.
- Confirm audit events include counts, not only prose.
notes: Implemented Librarian dry-run policy skeleton and tests; handoff written for
  Claude review and human approval checklist.
