objective: >
  Close the three integrity-hygiene findings from the Claude Phase 3.4 review
  (docs/REVIEW_CLAUDE_PHASE_3_4.md). The worktree/HMAC/replay/executor engineering is
  correct and the branch is green at HEAD; this task only makes the verification record
