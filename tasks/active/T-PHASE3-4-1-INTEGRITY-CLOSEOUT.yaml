context: |
  Claude Phase 3.4 verdict: APPROVE WITH CHANGES. Phase 3.5 blocked until this closeout.

  Independent verification of agent/composer/T-PHASE3-4-WORKTREE-APPROVAL-MVP @ 19732d9:
  - py scripts/validate.py -> exit 0 at HEAD
  - py -m unittest -> 333 tests, OK, exit 0 at actual HEAD (reproduced)
  - worktree allocator (argv-only git, allowlist, path containment, conservative cleanup),
    HMAC signing (env keys, constant-time, TTL caps, scope binding), O_EXCL anti-replay,
    and executor integration are all correct and safe.

  Findings (integrity, not safety):
  - F1: committed runtime/unittest_last_run.txt records commit_full 0a638bc, which was
    rebased away (0a638bc -> ecec766) and is NOT on the branch; it disagrees with the
    handoff block tests_commit_sha ecec766. Outcome (333/exit 0) is true and reproduced,
    but the artifact does not reference the shipped implementation commit.
  - F2: decisions/ was added to POST_TEST_ALLOWLIST_PREFIXES; ADRs are validated by
    validate.py, so post-test ADR changes can pass the verify CLI without re-running the
    validator at HEAD.
  - F3: verify_repository_verification.py does not cross-check the artifact commit_full
    against tests_commit_sha (which is why F1 slipped through).
goals:
  - F1 regenerate runtime/unittest_last_run.txt at the implementation commit (ecec766)
    or final HEAD so commit_full is on-branch and equals tests_commit_sha
  - "F2 resolve decisions/ allowlist widening; preferred: verify CLI re-runs validate.py at HEAD and asserts exit 0; alternative: keep ADRs in implementation commit and drop decisions/ from the allowlist"
  - "F3 verify CLI asserts artifact.commit_full equals tests_commit_sha and is an ancestor of HEAD, with a regression test"
  - Re-run validator and full suite from canonical clone at final HEAD; both exit 0
  - Produce a truthful v2 handoff verification block reproducible by the reviewer
non_goals:
  - Changes to worktree allocator, HMAC signing, anti-replay, or executor logic (correct)
  - Real-agent adapter promotion (all remain supports_execution false)
  - Phase 3.5 / Level-2 scheduling / queue
  - Any change to autonomy level (stays Level 1)
  - New runtime subprocess surfaces
