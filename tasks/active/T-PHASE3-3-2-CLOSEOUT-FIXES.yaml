context: |
  Claude closeout review verdict: REJECT (see docs/REVIEW_CLAUDE_PHASE_3_3_1_CLOSEOUT.md).

  Independent verification of agent/composer/T-PHASE3-3-REVIEW-FIXES @ f7ec3ca:
  - py scripts/validate.py -> exit 1 (handoff missing ## Open Questions)
  - py -m unittest -> 296 tests, 1 FAILURE (test_planned_mcps_pass_validation, which
    shells out to validate.py and asserts exit 0)
  - committed v2 verification block records test_exit_code:0 and validator_exit_code:0
    (both false), local_head_sha 97ee688 (stale; actual HEAD f7ec3ca), and
    tests_commit_sha 93fa558 != head.
  - validate_handoff_verification_block does NOT enforce tests_commit_sha == local_head_sha,
    so the protocol cannot catch this class of discrepancy.

  Single root cause cascade: missing handoff section -> validator exit 1 ->
  doc-validating test fails -> suite red -> artifact/handoff certify false green.
goals:
  - Add ## Open Questions to handoffs/T-PHASE3-3-REVIEW-FIXES__composer__to__claude.md
  - Re-run validator + full suite from canonical clone at the final HEAD; both exit 0
  - Make tests_commit_sha == local_head_sha (test the shipped commit) or gitignore the
    artifact so HEAD does not advance past the tested tree
  - Correct the handoff Repository Verification block and the chat summary to record the
    actual final HEAD and the true (post-fix) exit codes
  - Strengthen validate_handoff_verification_block to enforce tests_commit_sha ==
    local_head_sha, with a regression test for the mismatch case
  - Remove or gitignore stray scratch files (test_out.txt, runtime/test_*.txt, etc.)
non_goals:
  - Phase 3.4 worktree allocator / HMAC signing implementation
  - Scheduler / queue implementation
  - Real-agent adapter promotion (all remain supports_execution false)
  - Any change to autonomy level (stays Level 1)
  - Changes to M2/L3 dispatch logic (already correct)
  - New runtime subprocess surfaces
