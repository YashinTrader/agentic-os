constraints:
  - No agent execution, MCP execution, or LLM APIs in this task
  - Validator must still pass without requiring vault, CLIs, or MCP servers
  - All new tests must run under python -m unittest with no extra setup
  - ADR-0013 approval level reviewer; no human approval required
  - Risk-gate behavior change must be covered by regression tests
  - Event-vocabulary changes must keep historical v1 lines warning-only
acceptance:
  - orchestrator/risk.py treats requires_human_approval=true as authoritative
  - orchestrator/risk.py applies precedence human > reviewer > read-only
  - tests/test_risk_gate.py covers the three precedence failure modes from review
  - daemon/registry_writer.py emits type=discovery_completed (or canonical type is pruned)
  - scripts/sync_obsidian.py emits vault_sync_planned (dry-run) and vault_sync_completed (real)
  - orchestrator/nodes.py imports team scoring without sys.path mutation
  - docs/OBSIDIAN_SYNC.md Safety Rules §3 matches actual write behavior
  - Single canonical human-approval list with cross-doc links
  - Runtime artifacts (cli_inventory.yaml, daemon_status.json) handled per chosen policy
  - python -m unittest passes (target 160+ tests after additions)
  - python scripts/validate.py passes (warnings only for historical v1 events)
notes: >
  Required fixes from docs/REVIEW_CLAUDE_PHASE_2.md. After this lands, open a
  separate task for Phase 3 design (dispatch adapter contract ADR, allowlist
  scheme, dry-run runner spec, command-preview spec, timeout/log-capture spec,
  worktree-isolation spec, approval-enforcement spec). Phase 3 implementation
  remains blocked by ADR-0012 and PHASE_3_READINESS_CRITERIA.md until those
  design ADRs are accepted and gates E2-E6 are implemented with tests.
