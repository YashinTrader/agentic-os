id: T-CLAUDE-PHASE2-FIXES
title: Phase 2.6 — Claude review fixes (risk-gate, event vocabulary, cleanups)
owner: composer
reviewer: claude
created_by: claude
status: review
phase: "2.6"
created_at: 2026-06-07T23:30:00Z
updated_at: 2026-06-07T23:45:00Z
priority: high
risk_level: medium
requires_human_approval: false
human_approval_checklist: []
objective: >
  Apply the High and Medium priority fixes from the Claude end-of-Phase-2
  review (docs/REVIEW_CLAUDE_PHASE_2.md) so the Phase 2 foundation is safe
  to extend into Phase 3 design and (later) implementation. Planning-only;
  no agent execution, no LLM/MCP calls, no new feature scope.
context: |
  Claude end-of-Phase-2 review verdict: APPROVE WITH CHANGES,
  Phase 3 readiness: READY FOR PHASE 3 DESIGN ONLY.

  Two High-priority issues must be fixed before Phase 3 dispatch work can
  even start: (H1) risk-gate keyword precedence and ignored
  requires_human_approval flag, and (H2) event-vocabulary drift between
  protocol/event_types.py and the actual emitters.

  Medium-priority items (M1-M5) close test gaps, documentation drift, and
  a package-boundary issue. Low-priority items (L1-L6) are optional cleanup
  and can be deferred.

  This task does NOT start Phase 3. Phase 3 implementation remains blocked
  by ADR-0012 and docs/PHASE_3_READINESS_CRITERIA.md.
goals:
  - Fix risk-gate precedence (H1) with new tests
  - Wire emitters to the canonical Phase 2 event vocabulary (H2)
  - Add risk-gate precedence test cases (M1)
  - Soften OBSIDIAN_SYNC Safety Rules §3 to match implementation (M2)
  - Extract score_team/load_teams_registry into an importable module (M3)
  - Consolidate the human-approval list into a single canonical doc (M4)
  - Clarify runtime-artifact handling for empty inventory/status files (M5)
non_goals:
  - Phase 3 agent execution, dispatch adapters, or autonomous runners
  - LLM API calls, MCP execution, paid APIs, database, network calls
  - Bidirectional Obsidian sync or vault content reading
  - New dashboard write/execute surfaces
  - Restructuring the planning graph beyond minimal import cleanup
