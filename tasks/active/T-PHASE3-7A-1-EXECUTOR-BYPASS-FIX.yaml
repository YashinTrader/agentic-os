constraints:
  - No live Codex execution via any path
  - No human approval created or consumed; no 3.7B authorization artifact
  - Validator must pass at the FINAL HEAD (exit 0, warnings only for historical v1 events)
  - Full suite must pass at the FINAL HEAD from canonical clone C:\Users\gabot\agentic-os
  - Verification block truthful and reviewer-reproducible (artifact commit_full == tests_commit_sha)
acceptance:
  - dispatch/execution_gate.py blocks codex-restricted (canary_only) on the main execute
    path regardless of a valid signed human approval, until 3.7B authorization + live_run_authorized
  - New regression test proves execute_dispatch.py --execute on codex-restricted is blocked
    without 3.7B authorization (and that the fixture still executes)
  - run_codex_canary.py still refuses (exit 3); no behavior change to the canary stack
  - Handoff/self-review wording qualified per M1
  - py scripts/validate.py exit 0 at HEAD
  - py -m unittest discover -s tests -p "test_*.py" -> all green at HEAD
  - python scripts/verify_repository_verification.py <handoff> -> Status: verified
notes: >
  After this lands and Claude re-verifies H1 is closed with the suite green, Claude will
  flip the ADR-0038-0041 reviewer sign-offs. ONLY THEN may Phase 3.7B (first live canary)
  be opened — human-approved via the ADR-0035 two-person gate, documentation-only first
  canary per ADR-0036, on a Phase 3.4 worktree with emergency rollback per ADR-0037, and
  reviewed by Claude before any live Codex run.
