objective: 'Implement the first read-only `agentic-os-memory` MCP adapter skeleton
  using a fixture backend, with all five Phase 2.1 read tools returning valid empty
  or fixture-backed responses.

  '
context: 'ADR-0009 requires a versioned MCP server with read-only tools first. This

  task should establish the contract surface without connecting to Cognee and

  without adding write tools.

  '
goals:
- Add a local MCP adapter entrypoint named for `agentic-os-memory`.
- Implement `memory.search`, `memory.get`, `memory.list_entities`, `memory.timeline`,
  and `memory.graph_neighbors` against a fixture backend.
- Return contract-versioned JSON shapes that match ADR-0009.
- Add fixture-based tests for empty-store and basic success/error paths.
non_goals:
- Do not connect to Cognee.
- Do not add write tools.
- Do not implement Librarian behavior.
- Do not add dashboard integration.
inputs:
- decisions/ADR-0009-mcp-adapter-contract.md
- decisions/ADR-0007-memory-architecture.md
- scripts/
- tests/
outputs:
- scripts/
- tests/
- requirements.txt
constraints:
- Keep dependencies minimal; if an MCP SDK is added, justify it in the PR body.
- Bind any HTTP mode to localhost only if HTTP mode is included.
- Fixture tests must not require Cognee, Ollama, or network access.
acceptance:
- All five read tools are implemented against a fixture backend.
- Tool outputs include `contract_version`.
- Write tools are absent from the advertised tool list.
- Fixture tests cover empty store, not found, invalid argument, and namespace denial.
- '`python3 scripts/validate.py` exits 0.'
- Relevant unit tests exit 0.
human_approval_checklist: []
notes: Archived after Claude reviewer sign-off and human approval. PR 14 merged.
