id: T-0024
title: Implement deterministic memory extractors
status: done
owner: codex
reviewer: claude
created_by: codex
created_at: '2026-05-24T14:45:00Z'
updated_at: '2026-05-24T21:12:31Z'
phase: '2.1'
priority: high
risk_level: medium
requires_human_approval: false
depends_on:
- T-0022
related_decisions:
- ADR-0007
- ADR-0008
objective: 'Implement deterministic extractors that turn task YAML, ADR files, and
  event log entries into entity and episodic memory records.

  '
context: 'ADR-0008 requires deterministic extraction wherever possible. This task

  implements the non-LLM extraction layer before any summarization or semantic

  memory promotion.

  '
goals:
- Extract task entities from task YAML.
- Extract ADR entities and status from ADR files.
- Extract episodic records from `logs/agent-events.jsonl`.
- Produce stable IDs and source refs matching ADR-0007 and ADR-0008.
non_goals:
- Do not use an LLM.
- Do not write to shared memory.
- Do not connect to Cognee unless T-0023 has landed and the task is amended.
- Do not implement MCP write tools.
inputs:
- decisions/ADR-0007-memory-architecture.md
- decisions/ADR-0008-librarian-and-write-rules.md
- tasks/
- decisions/
- logs/agent-events.jsonl
outputs:
- scripts/
- tests/
constraints:
- Extractors must be deterministic and idempotent.
- Existing deprecated v1 log events must be handled without failing.
- Source refs must be repo-relative and stable.
acceptance:
- Unit tests cover task entity extraction.
- Unit tests cover ADR entity/status extraction.
- Unit tests cover event-log episodic extraction.
- Re-running extraction over the same inputs produces identical record IDs.
- '`python3 scripts/validate.py` exits 0.'
human_approval_checklist: []
notes: Archived
